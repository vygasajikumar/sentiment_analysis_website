<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Analysis</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            text-align: center;
            background-color: chartreuse;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            background-color: beige;
            border: 30px;
            border-width 50px;
            border-color: black;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Sentiment Analysis</h1>

    <textarea id="review" placeholder="Enter your review"></textarea>
    <br>

    <button onclick="analyzeSentiment()">Analyze</button>

    <div id="result"></div>

    <script>
    function analyzeSentiment() {

    const text = document
        .getElementById("review")
        .value
        .toLowerCase();

    const positiveWords = [
        "good", "great", "excellent", "amazing",
        "awesome", "love", "best", "happy",
        "fantastic", "nice","beautiful"
    ];

    const negativeWords = [
        "bad", "worst", "terrible", "awful",
        "hate", "poor", "sad", "boring",
        "disappointing", "horrible"
    ];
    const negations = ["not", "never", "no", "don't", "isn't", "wasn't"];
    let score = 0;

    const words = text.split(" ");
    for (let i = 0; i < words.length; i++) {

    if (negations.includes(words[i]) && i < words.length - 1) {

        if (positiveWords.includes(words[i + 1])) {
            score--;
            i++; // Skip next word
            continue;
        }

        if (negativeWords.includes(words[i + 1])) {
            score++;
            i++; // Skip next word
            continue;
        }
    }

    if (positiveWords.includes(words[i])) {
        score++;
        continue;
    }

    if (negativeWords.includes(words[i])) {
        score--;
    }
}
    
     let sentiment = "";

    if (score > 0) {
        sentiment = "😊 Positive";
    } else if (score < 0) {
        sentiment = "😞 Negative";
    } else {
        sentiment = "😐 Neutral";
    }

    document.getElementById("result").innerHTML =
        `${sentiment}<br>Score: ${score}`;
}

            
            
    </script>

</body>
</html>
